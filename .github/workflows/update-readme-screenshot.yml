name: Update README Screenshot

on:
  workflow_dispatch:

concurrency:
  group: update-readme-screenshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-screenshot:
    name: Render plugin UI and update README
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure screenshot build
        run: cmake -S . -B build-screenshot -DCMAKE_BUILD_TYPE=Release -DBROWN_HELP_BUILD_TESTS=OFF -DBROWN_HELP_BUILD_SCREENSHOT_TOOL=ON

      - name: Build screenshot tool
        run: cmake --build build-screenshot --config Release --target BrownHelpUiScreenshot

      - name: Render plugin UI PNG
        run: ./build-screenshot/BrownHelpUiScreenshot docs/plugin-ui.png

      - name: Add screenshot to README
        run: python3 Tools/update_readme_screenshot.py

      - name: Commit README screenshot
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/plugin-ui.png

          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Update README plugin UI screenshot"

            for attempt in 1 2 3; do
              if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
                exit 0
              fi

              echo "Push attempt ${attempt} failed because the branch moved. Retrying..."
              git rebase --abort || true
              sleep 3
            done

            echo "Could not push README screenshot after 3 attempts."
            exit 1
          fi
